<nav class="navbar">
  <div class="navbar-container">
    <a routerLink="/" class="brand" (click)="closeMenu()">
      <span class="brand-icon">✦</span>
      <span class="brand-name">Kavya Creations</span>
    </a>

    <button class="menu-toggle" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav-links" [class.open]="menuOpen">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Home</a></li>
      <li><a routerLink="/products" routerLinkActive="active" (click)="closeMenu()">All Jewellery</a></li>
      <li><a routerLink="/products" [queryParams]="{category:'bangles'}" routerLinkActive="active" (click)="closeMenu()">Bangles</a></li>
      <li><a routerLink="/products" [queryParams]="{category:'earrings'}" routerLinkActive="active" (click)="closeMenu()">Earrings</a></li>
      <li><a routerLink="/products" [queryParams]="{category:'necklaces'}" routerLinkActive="active" (click)="closeMenu()">Necklaces</a></li>
      <li><a routerLink="/products" [queryParams]="{category:'accessories'}" routerLinkActive="active" (click)="closeMenu()">Accessories</a></li>
      <li>
        <a routerLink="/cart" routerLinkActive="active" class="cart-link" (click)="closeMenu()">
          <span class="cart-icon">🛒</span>
          @if (cartService.totalItems() > 0) {
            <span class="cart-badge">{{ cartService.totalItems() }}</span>
          }
        </a>
      </li>
    </ul>
  </div>
</nav>

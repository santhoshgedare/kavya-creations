<div class="admin-page">
  <div class="admin-header">
    <h1>Products</h1>
    <button mat-raised-button class="new-product-btn" (click)="openDialog(null)">
      <mat-icon>add</mat-icon> New Product
    </button>
  </div>

  @if (loading()) {
    <div class="loading-center"><mat-spinner diameter="48"></mat-spinner></div>
  } @else {
    <mat-table [dataSource]="products()" class="admin-table">
      <ng-container matColumnDef="name">
        <mat-header-cell *matHeaderCellDef>Name</mat-header-cell>
        <mat-cell *matCellDef="let p">
          <div class="product-cell">
            <img [src]="p.primaryImageUrl | imageUrl" [alt]="p.name" class="table-img">
            <span>{{ p.name }}</span>
          </div>
        </mat-cell>
      </ng-container>

      <ng-container matColumnDef="category">
        <mat-header-cell *matHeaderCellDef>Category</mat-header-cell>
        <mat-cell *matCellDef="let p">{{ p.categoryName }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="price">
        <mat-header-cell *matHeaderCellDef>Price</mat-header-cell>
        <mat-cell *matCellDef="let p">{{ p.effectivePrice | currency:'INR':'symbol':'1.0-0' }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="stock">
        <mat-header-cell *matHeaderCellDef>Stock</mat-header-cell>
        <mat-cell *matCellDef="let p">{{ p.stockQuantity }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="status">
        <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
        <mat-cell *matCellDef="let p">
          <mat-chip [class]="'status-' + p.status">{{ ProductStatus[p.status] }}</mat-chip>
        </mat-cell>
      </ng-container>

      <ng-container matColumnDef="featured">
        <mat-header-cell *matHeaderCellDef>Featured</mat-header-cell>
        <mat-cell *matCellDef="let p">
          <mat-icon [color]="p.isFeatured ? 'primary' : undefined">
            {{ p.isFeatured ? 'star' : 'star_border' }}
          </mat-icon>
        </mat-cell>
      </ng-container>

      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
        <mat-cell *matCellDef="let p">
          <button mat-icon-button color="primary" (click)="openDialog(p)" title="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteProduct(p)" title="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
    </mat-table>

    <mat-paginator
      [length]="totalCount()"
      [pageSize]="pageSize"
      [pageIndex]="page() - 1"
      [pageSizeOptions]="[20, 50]"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>
  }
</div>
